<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <title>Project </title>
</head>
<body>
    <div class="color-mode">
        <button id="light-mode">Light</button>
        <button id="dark-mode">Dark</button>
    </div>

  
    <div class="content-wrapper">
        <header>
            <h1 class="title">Control Panel</h1>
        </header>

        <main>
            <section class="card">
                <div class="button-container">
                    <button id="plus">+</button>
                    <button id="minus">-</button>
                    <button id="reset">Reset</button>
                </div>
                <p id="counter" class="counter-value">0</p>
            </section>

            <section class="card setup-info">
                <h3>Мой сетап на сегодня:</h3>
                <div class="add-tech-box">
                    <input type="text" id="tech-input" placeholder="Введите девайс...">
                    <button id="add-tech-btn">Добавить</button>
                </div>
                <p id="display-list"></p>
                <p>Всего девайсов: <b id="count"></b></p>
            </section>

            <button class="btn3">Сменить картинку</button>
            
            <img id="my-image" src="https://images.unsplash.com/photo-1542652694-40abf526446e?q=80&w=400" alt="Style Image">
        </main>
    </div>


</body>
</html>
